<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - عروض</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
        }
        .offers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .offer {
            margin: 20px;
            width: calc(33.33% - 20px);
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .offer img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .offer h2 {
            font-size: 18px;
            font-weight: 500;
            margin: 10px 0;
        }
        .offer p {
            font-size: 14px;
            color: #666;
            margin: 10px 0;
        }
        .offer button {
            background-color: #C8102E;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .offer button:hover {
            background-color: #b30a2a;
        }
        @media (max-width: 768px) {
            .offer {
                width: calc(50% - 20px);
            }
        }
        @media (max-width: 480px) {
            .offer {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YOUGO - عروض</h1>
        </div>
        <div class="offers">
            <div class="offer">
                <img src="https://via.placeholder.com/300" alt="عرض 1">
                <h2>عرض 1</h2>
                <p>هذا هو عرضنا الأول</p>
                <button>اطلب الآن</button>
            </div>
            <div class="offer">
                <img src="https://via.placeholder.com/300" alt="عرض 2">
                <h2>عرض 2</h2>
                <p>هذا هو عرضنا الثاني</p>
                <button>اطلب الآن</button>
            </div>
            <div class="offer">
                <img src="https://via.placeholder.com/300" alt="عرض 3">
                <h2>عرض 3</h2>
                <p>هذا هو عرضنا الثالث</p>
                <button>اطلب الآن</button>
            </div>
        </div>
    </div>
    <script>
        // Add event listener to buttons
        const buttons = document.querySelectorAll('.offer button');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                alert('تم الطلب بنجاح!');
            });
        });
    </script>
</body>
</html>
