<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - تطبيق توصيل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #C8102E;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background-color: #f7f7f7;
            padding: 20px;
            margin: 20px;
            width: calc(33.33% - 20px);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .feature h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .feature p {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .call-to-action {
            background-color: #C8102E;
            color: #fff;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .call-to-action a {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
        }
        .footer {
            background-color: #C8102E;
            color: #fff;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .footer p {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 10px;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch a {
            font-size: 18px;
            font-weight: 400;
            text-decoration: none;
            color: #fff;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="#" dir="ltr" lang="he">עברית</a>
        <a href="#" dir="rtl" lang="ar">عربي</a>
    </div>
    <div class="header">
        <h1>YOUGO - تطبيق توصيل</h1>
        <p>توصيل سريع وموثوق لجميع احتياجاتك</p>
    </div>
    <div class="container">
        <div class="features">
            <div class="feature">
                <h2>توصيل سريع</h2>
                <p>نقدم لك توصيل سريع وموثوق لجميع احتياجاتك</p>
            </div>
            <div class="feature">
                <h2>خدمة عملاء</h2>
                <p>نقدم لك خدمة عملاء على مدار 24 ساعة</p>
            </div>
            <div class="feature">
                <h2>دفع آمن</h2>
                <p>نقدم لك دفع آمن وموثوق عبر الإنترنت</p>
            </div>
        </div>
        <div class="call-to-action">
            <a href="#">تحميل التطبيق الآن</a>
        </div>
    </div>
    <div class="footer">
        <p>YOUGO - تطبيق توصيل</p>
        <p>جميع الحقوق محفوظة 2023</p>
    </div>
</body>
</html>
