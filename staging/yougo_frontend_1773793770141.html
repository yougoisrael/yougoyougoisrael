<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - تطبيق توصيل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
        }
        .hero {
            background-image: linear-gradient(to bottom, #C8102E, #fff);
            padding: 50px 0;
            text-align: center;
        }
        .hero h2 {
            font-size: 36px;
            margin: 0;
        }
        .hero p {
            font-size: 18px;
            margin: 10px 0;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: calc(33.33% - 20px);
        }
        .feature h3 {
            font-size: 18px;
            margin: 0;
        }
        .feature p {
            font-size: 14px;
            margin: 10px 0;
        }
        .call-to-action {
            background-color: #C8102E;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .call-to-action:hover {
            background-color: #a80a24;
        }
        .footer {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        .footer p {
            font-size: 14px;
            margin: 0;
        }
        @media (max-width: 768px) {
            .feature {
                width: calc(50% - 20px);
            }
        }
        @media (max-width: 480px) {
            .feature {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YOUGO - تطبيق توصيل</h1>
        </div>
        <div class="hero">
            <h2>توصيل سريع وآمن</h2>
            <p>نقدم لك خدمة توصيل سريعة وآمنة لجميع احتياجاتك</p>
            <button class="call-to-action">تحميل التطبيق</button>
        </div>
        <div class="features">
            <div class="feature">
                <h3>توصيل سريع</h3>
                <p>نقدم لك خدمة توصيل سريعة لجميع احتياجاتك</p>
            </div>
            <div class="feature">
                <h3>توصيل آمن</h3>
                <p>نقدم لك خدمة توصيل آمنة لجميع احتياجاتك</p>
            </div>
            <div class="feature">
                <h3>دعم فني</h3>
                <p>نقدم لك دعم فني لجميع استفساراتك</p>
            </div>
        </div>
        <div class="footer">
            <p>YOUGO - تطبيق توصيل &copy; 2024</p>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const callToAction = document.querySelector(".call-to-action");
            callToAction.addEventListener("click", function() {
                alert("تم تحميل التطبيق بنجاح!");
            });
        });
    </script>
</body>
</html>
