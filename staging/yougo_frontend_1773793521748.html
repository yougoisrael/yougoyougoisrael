<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUGO - تطبيق توصيل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #C8102E;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }
        .content {
            padding: 20px;
        }
        .content h2 {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .content p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #C8102E;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #a30926;
        }
        .lang-switch {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .lang-switch a {
            color: #fff;
            text-decoration: none;
            margin-left: 10px;
        }
        .lang-switch a:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YOUGO - تطبيق توصيل</h1>
            <div class="lang-switch">
                <a href="#" lang="he">עברית</a>
                <a href="#" lang="ar">عربية</a>
            </div>
        </div>
        <div class="content">
            <h2>مرحباً بك في YOUGO</h2>
            <p>تطبيق توصيل سريع وآمن لجميع احتياجاتك</p>
            <button class="btn">تحميل التطبيق</button>
        </div>
    </div>
    <script>
        const langSwitch = document.querySelector('.lang-switch');
        const langLinks = langSwitch.querySelectorAll('a');
        langLinks.forEach((link) => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const lang = link.getAttribute('lang');
                document.documentElement.lang = lang;
                document.documentElement.dir = lang === 'he' ? 'ltr' : 'rtl';
            });
        });
    </script>
</body>
</html>
